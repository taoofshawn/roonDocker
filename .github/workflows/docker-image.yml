name: build and push docker image

on:
  push:
    branches:
      - 'main'

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: login to ghcr
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: build and push
      run: |
        TAG=$(date +%Y%m%d_%H%M)
        docker build . --no-cache --file Dockerfile --tag ghcr.io/taoofshawn/roon:$TAG
        docker tag ghcr.io/taoofshawn/roon:$TAG ghcr.io/taoofshawn/roon:latest
        docker push ghcr.io/taoofshawn/roon:$TAG
        docker push ghcr.io/taoofshawn/roon:latest
