name: auto-merge dockerfile-only prs

on:
  pull_request:
    paths:
      - 'Dockerfile'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: check only Dockerfile changed
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }})
          echo "Changed files:"
          echo "$CHANGED"
          echo "only_dockerfile=false" >> $GITHUB_ENV
          if [ "$(echo "$CHANGED" | wc -l)" -eq 1 ] && [ "$CHANGED" = "Dockerfile" ]; then
            echo "only_dockerfile=true" >> $GITHUB_ENV
          fi

      - name: approve and merge via API
        if: env.only_dockerfile == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "✅ Only Dockerfile changed — approving and merging via API"
          # Approve
          gh pr review ${{ github.event.pull_request.number }} --approve
          # Wait a moment for GitHub to register the approval
          sleep 3
          # Merge via the GitHub API directly
          curl -s -X PUT \
            -H "Authorization: token ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            -d '{"merge_method":"squash"}' \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/merge"
          echo ""

      - name: reject non-dockerfile changes
        if: env.only_dockerfile != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "❌ PR touches files beyond Dockerfile — requesting changes"
          gh pr comment ${{ github.event.pull_request.number }} --body "⚠️ This PR modifies files beyond `Dockerfile`. Only Dockerfile-only changes are auto-merged — merge manually."
